# Medplum workload profile — sandbox + egress proxy.
#
# Same shape as compose/eshop.yml. DB lives in compose/databases/medplum.yml.

name: ai-harness-medplum

x-restart: &restart-policy
  restart: "no"

services:
  egress-proxy:
    build:
      context: ../egress-proxy
    image: ai-harness/egress-proxy:latest
    container_name: ai-harness-medplum-egress
    <<: *restart-policy
    networks: [medplum-net]

  medplum:
    image: ${MEDPLUM_IMAGE:-ai-harness/medplum:latest}
    container_name: ai-harness-medplum
    <<: *restart-policy
    depends_on:
      egress-proxy: { condition: service_started }
    # See compose/eshop.yml for the isolation contract — same rationale.
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_PTRACE
      - SYS_TIME
      - SYS_TTY_CONFIG
    security_opt:
      - no-new-privileges:true
    user: "0:0"
    environment:
      PG_HOST:           postgres
      REDIS_HOST:        redis
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      TASK_ID:           "${TASK_ID:-}"
      # Run identifier set by the CLI — runner.sh writes it into result.json
      # and uses it for the per-run results directory name.
      RUN_ID:            "${RUN_ID:-}"
      # Optional test-scope narrowing: passes through to jest's
      # `--testPathPattern` in runner.sh do_test. Empty default = full suite.
      TEST_FILTER:       "${TEST_FILTER:-}"
      # See compose/eshop.yml for the egress-enforcement caveat.
    tmpfs:
      - /tmp:size=512m
    volumes:
      # See compose/eshop.yml for the full mount contract — same shape here.
      - "${RESULTS_DIR:?CLI must set RESULTS_DIR}:/results"
      - "${SOURCE_DIR:?CLI must set SOURCE_DIR to a directory}:/workspace/src:ro"
      - "${MEMORY_DIR:?CLI must set MEMORY_DIR to a directory}:/memory:rw"
    networks: [medplum-net]

networks:
  # The DB compose owns this network's lifecycle. Workload joins as external.
  medplum-net:
    name: ai-harness-medplum-net
    external: true
