# eShopOnWeb workload profile — sandbox + egress proxy.
#
# The DATABASE lives in a separate compose file with an independent
# lifecycle: see compose/databases/eshop.yml. The workload joins the DB's
# network as `external: true` and connects to `sqlserver:1433` via the
# alias declared in the DB compose.
#
# Bring up (manually):
#   docker compose -f compose/databases/eshop.yml -p ai-harness-eshop-db up -d --wait
#   docker compose -f compose/eshop.yml          -p ai-harness-eshop    up -d --wait
#
# Bring up (via CLI, which orders this for you):
#   harness/sandbox.py db-up eshop
#   harness/sandbox.py run   eshop test
#
# Reset:
#   - per-iteration:  compose down -v on THIS file only (DB keeps running).
#   - full reset:     compose down -v on this file AND the DB compose.
#
# Snapshot baseline:
#   `sandbox warmup eshop` brings up DB cold + workload, runs
#   restore + build + migrate, `docker commit`s both containers as `:warm`,
#   tears down. Subsequent `db-up` + `run` restore from `:warm` tags.

name: ai-harness-eshop

x-restart: &restart-policy
  restart: "no"   # ephemeral by design — don't auto-restart crashed containers

services:
  # ───────────────────────── egress allowlist ─────────────────────────
  # tinyproxy with an FQDN allowlist. Available on the per-project network
  # for any opt-in callers. NOT enforced — the workload's netns has direct
  # outbound. Setting HTTP_PROXY broke LibMan's HTTPS-via-proxy negotiation,
  # so the env-var injection is disabled. See README "Egress allowlist
  # (caveat)" for the full story.
  egress-proxy:
    build:
      context: ../egress-proxy
    image: ai-harness/egress-proxy:latest
    container_name: ai-harness-eshop-egress
    <<: *restart-policy
    networks: [eshop-net]

  eshop:
    image: ${ESHOP_IMAGE:-ai-harness/eshop:latest}
    container_name: ai-harness-eshop
    <<: *restart-policy
    depends_on:
      egress-proxy: { condition: service_started }
    # ── Isolation ─────────────────────────────────────────────────────
    # Drop the dangerous-but-rarely-needed capabilities. Keeping
    # `cap_drop: ALL` blanket would also strip CAP_FOWNER / CAP_DAC_OVERRIDE /
    # CAP_CHOWN, which the workload root needs to manage the image's
    # /workspace/repo (baked as uid 1001 `agent`). The list below is the
    # standard "Docker-default + a few extras" — blocks kernel ops, raw
    # network, ptrace, time changes, audit, etc.
    cap_drop:
      - AUDIT_WRITE
      - MKNOD
      - NET_ADMIN
      - NET_RAW
      - SYS_ADMIN
      - SYS_MODULE
      - SYS_PTRACE
      - SYS_TIME
      - SYS_TTY_CONFIG
    security_opt:
      - no-new-privileges:true
    # WSL2 Docker Desktop doesn't propagate host bind-mount perms; root
    # in the workload is a deliberate trade — single-tenant container on
    # its own network namespace, no kernel caps, no-new-privileges, plus
    # optional gVisor (`runtime: runsc`) for kernel isolation. See README.
    user: "0:0"
    environment:
      # Connection info passed to runner.sh; the eshop image's Program.cs
      # reads ConnectionStrings__* from environment. `sqlserver` resolves
      # via the network alias declared in compose/databases/eshop.yml.
      SQL_HOST:           sqlserver
      MSSQL_SA_PASSWORD:  "${MSSQL_SA_PASSWORD:?set MSSQL_SA_PASSWORD in .env}"
      TASK_ID:            "${TASK_ID:-}"
      # Run identifier set by the CLI — runner.sh writes it into result.json
      # and uses it for the per-run results directory name.
      RUN_ID:             "${RUN_ID:-}"
      # Optional test-scope narrowing: passes through `dotnet test --filter`.
      # Empty default = full suite. See runner.sh do_test.
      TEST_FILTER:        "${TEST_FILTER:-}"
      # NOTE: HTTP_PROXY / HTTPS_PROXY are deliberately NOT set here.
      # See README "Egress allowlist (caveat)" for the full story.
    tmpfs:
      # /workspace is intentionally NOT tmpfs — it shadows the image's
      # baked /workspace/repo clone. The container's writable layer holds
      # any in-run edits, and `compose down -v` discards it cleanly.
      - /tmp:size=512m
    volumes:
      # All paths are absolute — set by the CLI (`sandbox.py`) at compose-up
      # time. Compose resolves relative paths against the *compose file's*
      # directory (not the CWD), which silently mounts the wrong location.
      #
      # /results        per-run output dir; runner.sh writes result.json + logs
      # /workspace/src  optional read-only source override; runner.sh syncs
      #                 it onto /workspace/repo at startup (rsync, preserving
      #                 bin/obj/.git). The CLI sets SOURCE_DIR to an empty
      #                 host dir when --source isn't passed.
      # /memory         optional persistent agent scratchpad scoped to a
      #                 task_id. Survives `compose down -v` (host bind mount).
      #
      # `/dev/null` defaults are deliberately avoided. Docker Desktop on
      # WSL2 caches bind-mount metadata keyed on (container_name, dst);
      # once /workspace/src has been bound to /dev/null (a char device),
      # a subsequent run that asks for a real directory at the same dst
      # gets "not a directory" at OCI init.
      - "${RESULTS_DIR:?CLI must set RESULTS_DIR to an absolute host path}:/results"
      - "${SOURCE_DIR:?CLI must set SOURCE_DIR to a directory}:/workspace/src:ro"
      - "${MEMORY_DIR:?CLI must set MEMORY_DIR to a directory}:/memory:rw"
    networks: [eshop-net]
    # Default cmd is sleep infinity (from the image's tini ENTRYPOINT) so
    # the caller can `docker compose exec` arbitrary work into it.

networks:
  # The DB compose owns this network's lifecycle. Workload joins as external.
  eshop-net:
    name: ai-harness-eshop-net
    external: true
