User  proxy
Group proxy
Port  8888
Listen 0.0.0.0
Timeout 600

LogLevel Info
LogFile  "/dev/stdout"
PidFile  "/tmp/tinyproxy.pid"

# Default deny: allowlist is enforced by the Filter directive below.
Filter            "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterURLs        No
FilterExtended    Yes

# CONNECT only to TLS-standard ports. Blocks SSH tunnels and odd-port exfil.
ConnectPort 443
ConnectPort 8443

# Refuse anything we can't filter properly (FTP, gopher, etc.)
DisableViaHeader Yes
